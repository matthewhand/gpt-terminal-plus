# electron-builder packaging config for the desktop shell.
#
# The package.json "main" stays dist/index.js (the server entry used by `npm
# start` and @yao-pkg/pkg). For the packaged desktop app we override the entry
# to electron/main.js via extraMetadata so both use-cases coexist.
#
# Build: npm run dist:linux        (AppImage installer)
#        npm run dist:dir          (unpacked, fast, no installer — good for smoke)
appId: com.gptterminalplus.desktop
productName: GPT Terminal Plus
copyright: MIT

directories:
  output: release

# ssh2 pulls an OPTIONAL native dep (cpu-features) for crypto acceleration; it
# is not required (ssh2 falls back to Node's built-in crypto). Skip the Electron
# native rebuild so packaging does not need a C++ toolchain.
npmRebuild: false

extraMetadata:
  main: electron/main.js

# Ship the compiled server, the shell, the web UI and runtime config. Source
# maps, TS sources and tests are excluded to keep the bundle lean.
files:
  - dist/**/*
  - electron/**/*
  - public/**/*
  - config/**/*
  - package.json
  - "!**/*.map"
  - "!**/*.ts"
  - "!**/__tests__/**"

# asar:false keeps resources as plain files so the `config` package and the
# server resolve paths normally (no asar:// surprises) — simplest for a
# prototype; revisit asar+unpack for a size-optimized release.
asar: false

# A single 512x512 PNG; electron-builder derives the per-platform icon sets
# (.icns / .ico / hicolor) from it at build time.
icon: build/icon.png

linux:
  target:
    - AppImage
  category: Development
  synopsis: Secure multi-protocol execution platform with optional AI
  icon: build/icon.png

# macOS and Windows targets are configured but must be built on (or cross-built
# from) their native toolchains — `dist:linux` only produces the AppImage here.
mac:
  target:
    - dmg
    - zip
  category: public.app-category.developer-tools
  icon: build/icon.png

win:
  target:
    - nsis
    - portable
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
