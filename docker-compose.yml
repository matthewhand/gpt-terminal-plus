version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5004:5004" # Map the port from your container to the host
    environment:
      - NODE_ENV=prod
      - DEBUG=false # Set to true if you want to enable debugging
      - API_TOKEN=${API_TOKEN}
    volumes:
      - .:/usr/src/app # Mount the app directory to the container
      - /usr/src/app/node_modules # Keep node_modules on a named volume
    restart: unless-stopped

# Add other services like databases, caching, etc., here as needed.
