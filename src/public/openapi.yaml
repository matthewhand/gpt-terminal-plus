openapi: 3.1.0
info:
  title: System Info and Command Runner Plugin
  description: A plugin that allows users to run command line programs after obtaining the system information to accomplish its goal.
  version: 'v1.1'
servers:
  - url: https://gpt-terminal-plus.teamstinky.duckdns.org/
paths:
  /set-server:
    post:
      summary: Set the server to a predefined hostname or to the current host.
      operationId: setServer
      x-openai-isConsequential: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                server:
                  type: string
                  description: The server to set.
      responses:
        '200':
          description: The server was successfully set.
          content:
            application/json:
              schema:
                type: object
                properties:
                  output:
                    type: string
                    description: A message indicating the server was successfully set.
                  systemInfo: 
                    type: object
                    description: Information about the system of the set server.
        '400':
          description: Bad request due to invalid input.
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: Internal server error.
          content:
            text/plain:
              schema:
                type: string  
  /run:
      post:
        summary: Run a command
        operationId: runCommand
        x-openai-isConsequential: false
        required:
          - command
          - directory
        requestBody:
          content:
            application/json:
              schema:
                type: object
                properties:
                  command:
                    type: string
                    description: The command to run.
                  directory:
                    type: string
                    description: The directory to set as the current working directory before running the command.
                  shell:
                    type: string
                    description: The shell environment in which to run the command.
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    output:
                      type: string
                      description: The output of the command.  

  /list-files:
    post:
      summary: List files in a directory with pagination
      operationId: listFiles
      x-openai-isConsequential: false
      required:
        - directory
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                directory:
                  type: string
                  description: The directory to list files from.
                orderBy:
                  type: string
                  description: Order files by 'datetime' or 'filename'.
                  enum: ['datetime', 'filename']
                limit:
                  type: integer
                  description: The maximum number of files to return.
                  default: 42
                offset:
                  type: integer
                  description: The starting index for pagination.
                  default: 0
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: string
                    description: The list of files in the directory.
  /list-servers:
    get:
      summary: Get the list of available servers.
      operationId: listServers
      x-openai-isConsequential: false
      responses:
        '200':
          description: The list of available servers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListServersResponse'
components:
  schemas:
    ListServersResponse:
      type: object
      properties:
        servers:
          type: array
          items:
            type: string
          description: The list of available servers.