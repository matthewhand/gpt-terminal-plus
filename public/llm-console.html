<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Console - GPT Terminal Plus</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a; color: #e0e0e0; height: 100vh; display: flex;
        }
        .sidebar {
            width: 300px; background: #2d2d2d; border-right: 1px solid #444;
            overflow-y: auto; padding: 1rem;
        }
        .main-content {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
        }
        .header {
            padding: 1rem; border-bottom: 1px solid #444; background: #2d2d2d;
        }
        .session-detail {
            flex: 1; padding: 1rem; overflow-y: auto;
        }
        .session-item {
            display: block; width: 100%; text-align: left; font: inherit;
            color: inherit; border: none;
            padding: 0.75rem; margin-bottom: 0.5rem; background: #3d3d3d;
            border-radius: 6px; cursor: pointer; transition: background 0.2s;
        }
        .session-item:hover { background: #4d4d4d; }
        .session-item.active { background: #0066cc; }
        .session-id { font-weight: bold; font-size: 0.9rem; }
        .session-meta { font-size: 0.8rem; color: #aaa; margin-top: 0.25rem; }
        .step-item {
            background: #2d2d2d; border-radius: 6px; padding: 1rem; margin-bottom: 1rem;
            border-left: 4px solid #666;
        }
        .step-item.input { border-left-color: #4CAF50; }
        .step-item.output { border-left-color: #2196F3; }
        .step-item.error { border-left-color: #f44336; }
        .step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .step-type { font-weight: bold; color: #4CAF50; }
        .step-timestamp { font-size: 0.8rem; color: #aaa; }
        .step-content { background: #1a1a1a; padding: 0.75rem; border-radius: 4px; }
        .step-content pre { white-space: pre-wrap; word-break: break-word; }
        .loading { text-align: center; padding: 2rem; color: #aaa; }
        .error { color: #f44336; padding: 1rem; }
        .empty-state { text-align: center; padding: 2rem; color: #aaa; }
        .type-badge {
            display: inline-block; background: #444; color: #fff; padding: 0.2rem 0.5rem;
            border-radius: 12px; font-size: 0.7rem; margin-right: 0.25rem;
        }
        /* Stack the sidebar above the console on narrow viewports (was unusable
           below ~600px: fixed 300px sidebar + 100vh/overflow:hidden). The
           !important overrides nav.js's inline flex-direction on the wrapper. */
        @media (max-width: 640px) {
            .app-shell__content { flex-direction: column !important; overflow: auto !important; }
            .sidebar { width: 100%; max-height: 45vh; border-right: none; border-bottom: 1px solid #444; }
            .main-content { overflow: visible; }
        }
    </style>
    <link rel="stylesheet" href="/assets/base.css">
    <script src="/assets/nav.js" defer></script>
  </head>
<body>
    <div class="sidebar">
        <h2 style="margin-bottom: 1rem; color: #4CAF50;">Execution Sessions</h2>
        <div id="session-list" class="loading">Loading sessions...</div>
        
        <div id="ask-llm-panel" style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #444;">
            <div id="llm-disabled-note" style="display: none; color: #f44336; font-size: 0.85rem; margin-bottom: 0.5rem;">
                LLM execution is disabled. Enable it in <a href="/setup" style="color: #2196F3;">Setup &rarr; LLM</a>.
            </div>
            <h3 style="margin-bottom: 0.5rem; color: #2196F3;">Ask LLM</h3>
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                <label for="llm-prompt" class="visually-hidden">Ask the LLM about execution logs</label>
                <input type="text" id="llm-prompt" placeholder="Ask about execution logs..."
                       style="padding: 0.5rem; background: #3d3d3d; border: 1px solid #555; border-radius: 4px; color: #e0e0e0;">
                <button onclick="queryLLM()" style="padding: 0.5rem; background: #2196F3; border: none; border-radius: 4px; color: white; cursor: pointer;">
                    Query
                </button>
            </div>
            <div id="llm-response" style="margin-top: 1rem; padding: 0.75rem; background: #2d2d2d; border-radius: 4px; display: none;">
                <div style="font-size: 0.8rem; color: #aaa; margin-bottom: 0.5rem;">LLM Response:</div>
                <div id="llm-response-content" role="status" aria-live="polite"></div>
            </div>
        </div>
    </div>
    
    <div class="main-content">
        <div class="header">
            <h1>LLM Console</h1>
            <p style="color: #aaa; margin-top: 0.5rem;">Execution log viewer</p>
        </div>
        
        <div class="session-detail">
            <div id="session-detail" class="empty-state">
                Select a session from the sidebar to view details
            </div>
        </div>
    </div>

    <script>
        let sessions = [];
        let currentSession = null;

        async function loadSessions() {
            try {
                const response = await fetch('/activity/list');
                const data = await response.json();
                
                if (data.status === 'success') {
                    sessions = data.data.sessions;
                    renderSessionList();
                } else {
                    document.getElementById('session-list').innerHTML = 
                        `<div class="error">Error: ${data.message}</div>`;
                }
            } catch (error) {
                document.getElementById('session-list').innerHTML = 
                    `<div class="error">Failed to load sessions: ${error.message}</div>`;
            }
        }

        // Escape untrusted values before interpolating into HTML (XSS guard).
        function escapeHtml(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, c => (
                { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
            ));
        }

        function renderSessionList() {
            const container = document.getElementById('session-list');

            if (sessions.length === 0) {
                container.innerHTML = '<div class="empty-state">No sessions found</div>';
                return;
            }

            container.innerHTML = sessions.map(session => {
                const dateAttr = escapeHtml(JSON.stringify(String(session.date ?? '')));
                const idAttr = escapeHtml(JSON.stringify(String(session.sessionId ?? '')));
                const types = (session.types || []).map(type => `<span class="type-badge">${escapeHtml(type)}</span>`).join('');
                return `
                <button type="button" class="session-item" onclick="selectSession(this, ${dateAttr}, ${idAttr})">
                    <div class="session-id">${escapeHtml(session.sessionId)}</div>
                    <div class="session-meta">
                        ${escapeHtml(new Date(session.timestamp).toLocaleString())}<br>
                        ${escapeHtml(session.stepCount)} steps
                        ${types}
                    </div>
                </button>
            `;
            }).join('');
        }

        async function selectSession(el, date, sessionId) {
            // Update active session in sidebar (pass the clicked element instead
            // of relying on the global `event`, which is non-standard).
            document.querySelectorAll('.session-item').forEach(item => {
                item.classList.remove('active');
                item.setAttribute('aria-pressed', 'false');
            });
            if (el && el.classList) { el.classList.add('active'); el.setAttribute('aria-pressed', 'true'); }

            const detailContainer = document.getElementById('session-detail');
            detailContainer.innerHTML = '<div class="loading">Loading session details...</div>';

            try {
                const response = await fetch(`/activity/session/${date}/${sessionId}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    currentSession = data.data;
                    renderSessionDetail();
                } else {
                    detailContainer.innerHTML = `<div class="error">Error: ${escapeHtml(data.message)}</div>`;
                }
            } catch (error) {
                detailContainer.innerHTML = `<div class="error">Failed to load session: ${escapeHtml(error.message)}</div>`;
            }
        }

        function renderSessionDetail() {
            const container = document.getElementById('session-detail');
            
            if (!currentSession) {
                container.innerHTML = '<div class="empty-state">No session selected</div>';
                return;
            }

            const { meta, steps } = currentSession;
            
            let html = '';
            
            if (meta) {
                html += `
                    <div class="step-item">
                        <div class="step-header">
                            <span class="step-type">Session Info</span>
                            <span class="step-timestamp">${new Date(meta.startedAt).toLocaleString()}</span>
                        </div>
                        <div class="step-content">
                            <strong>Session ID:</strong> ${escapeHtml(meta.sessionId)}<br>
                            <strong>User:</strong> ${escapeHtml(meta.user)}<br>
                            <strong>Label:</strong> ${escapeHtml(meta.label)}
                        </div>
                    </div>
                `;
            }

            steps.forEach(step => {
                const isInput = step.type.includes('input');
                const isError = step.type.includes('error');
                const stepClass = isError ? 'error' : (isInput ? 'input' : 'output');
                
                html += `
                    <div class="step-item ${stepClass}">
                        <div class="step-header">
                            <span class="step-type">${escapeHtml(step.type)}</span>
                            <span class="step-timestamp">${escapeHtml(new Date(step.timestamp).toLocaleString())}</span>
                        </div>
                        <div class="step-content">
                            <pre>${escapeHtml(JSON.stringify(step, null, 2))}</pre>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Auto-hide the chat UI when /settings reports LLM disabled.
        async function checkLlmEnabled() {
            try {
                let token = '';
                try {
                    const usp = new URLSearchParams(location.search);
                    token = usp.get('token') || localStorage.getItem('gpt-terminal-token') || '';
                } catch {}
                const response = await fetch('/settings', {
                    headers: token ? { 'Authorization': 'Bearer ' + token } : {}
                });
                if (!response.ok) return; // can't tell — leave the UI as-is
                const payload = await response.json();
                const settings = payload.settings || payload;
                const enabled = settings.llm?.enabled?.value === true;
                if (!enabled) {
                    const panel = document.getElementById('ask-llm-panel');
                    panel.style.opacity = '0.5';
                    document.getElementById('llm-prompt').disabled = true;
                    panel.querySelector('button').disabled = true;
                    document.getElementById('llm-disabled-note').style.display = 'block';
                }
            } catch { /* network error — leave the UI as-is */ }
        }

        // Load sessions on page load
        loadSessions();
        checkLlmEnabled();
        
        // Auto-refresh every 30 seconds
        setInterval(loadSessions, 30000);
        
        // Handle Enter key in prompt input
        document.getElementById('llm-prompt').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                queryLLM();
            }
        });
        
        async function queryLLM() {
            const promptInput = document.getElementById('llm-prompt');
            const responseDiv = document.getElementById('llm-response');
            const responseContent = document.getElementById('llm-response-content');
            
            const prompt = promptInput.value.trim();
            if (!prompt) return;
            
            responseDiv.style.display = 'block';
            responseContent.innerHTML = '<div style="color: #aaa;">Thinking...</div>';
            
            try {
                const response = await fetch('/llm/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        prompt: prompt,
                        tools: ['listSessions', 'readFile']
                    })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    responseContent.innerHTML = `<div style="white-space: pre-wrap;">${escapeHtml(data.data.response)}</div>`;
                } else {
                    responseContent.innerHTML = `<div style="color: #f44336;">Error: ${escapeHtml(data.message)}</div>`;
                }
            } catch (error) {
                responseContent.innerHTML = `<div style="color: #f44336;">Failed to query LLM: ${escapeHtml(error.message)}</div>`;
            }
            
            promptInput.value = '';
        }
    </script>
</body>
</html>
