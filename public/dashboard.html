<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GPT Terminal Plus</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font); background: var(--bg); color: var(--text);
            min-height: 100vh;
        }
        h1 { padding: 1.5rem 2rem 0; max-width: 1200px; margin: 0 auto; }
        .main { padding: 1rem 2rem 2rem; max-width: 1200px; margin: 0 auto; }
        .features-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
            gap: 1.5rem; margin-top: 1.5rem;
        }
        .feature-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 1.5rem; transition: transform 0.2s, border-color 0.2s;
        }
        .feature-card:hover { transform: translateY(-2px); border-color: var(--accent); }
        .feature-card.disabled { opacity: 0.6; }
        .feature-card h3 { margin: 0 0 0.5rem 0; color: var(--accent); }
        .feature-card p { color: var(--text-muted); margin-bottom: 1rem; line-height: 1.4; }
        .feature-card .cta {
            display: inline-block; background: var(--accent); color: var(--accent-contrast);
            padding: 0.5rem 1rem; border-radius: 8px; text-decoration: none; font-weight: 600;
            transition: opacity 0.2s;
        }
        .feature-card .cta:hover { opacity: 0.9; }
        .feature-card .cta.disabled {
            background: var(--surface-2); color: var(--text-dim); cursor: not-allowed; pointer-events: none;
        }
        .loading { text-align: center; color: var(--text-muted); padding: 2rem; }
        .error { color: var(--error); }
    </style>
    <link rel="stylesheet" href="/assets/base.css">
    <script src="/assets/nav.js" defer></script>
  </head>
<body>
    <h1>Dashboard</h1>

    <div class="main">
        <h2>Features</h2>
        <div id="features-grid" class="features-grid">
            <div class="loading">Loading features...</div>
        </div>
        
    </div>

    <script>
        function getApiToken() {
            try {
                const usp = new URLSearchParams(location.search);
                if (usp.has('token')) return usp.get('token');
            } catch {}
            return localStorage.getItem('gpt-terminal-token') || '';
        }

        async function loadFeatures() {
            const grid = document.getElementById('features-grid');

            try {
                // Try to load settings to check feature flags
                const token = getApiToken();
                const response = await fetch('/settings', {
                    headers: token ? { 'Authorization': 'Bearer ' + token } : {}
                });
                let settings = {};

                if (response.ok) {
                    const payload = await response.json();
                    // GET /settings wraps groups as { settings: {...} }
                    settings = payload.settings || payload;
                }

                // Render feature cards
                grid.innerHTML = renderFeatureCards(settings);

            } catch (error) {
                grid.innerHTML = `<div class="error">Failed to load features: ${error.message}</div>`;
            }
        }

        function renderFeatureCards(settings) {
            const cards = [];

            // LLM Console Card — greyed out when /settings reports LLM disabled
            const llmEnabled = settings.llm?.enabled?.value === true;
            const canUseLLMConsole = llmEnabled;
            
            cards.push(`
                <div class="feature-card ${canUseLLMConsole ? '' : 'disabled'}">
                    <h3>LLM Execution Console</h3>
                    <p>Query your execution history using AI. Browse past sessions and get intelligent insights about your command history.</p>
                    <a href="/llm/console" class="cta ${canUseLLMConsole ? '' : 'disabled'}">
                        ${canUseLLMConsole ? 'Launch Console →' : 'Enable in Settings'}
                    </a>
                    ${!canUseLLMConsole ? '<p style="font-size: 0.8rem; color: #f44336; margin-top: 0.5rem;">Requires LLM execution to be enabled (Setup &rarr; LLM)</p>' : ''}
                </div>
            `);
            
            // API Documentation Card
            cards.push(`
                <div class="feature-card">
                    <h3>API Documentation</h3>
                    <p>Interactive Swagger UI for exploring all available endpoints. Test API calls directly from your browser.</p>
                    <a href="/docs" class="cta">View API Docs →</a>
                </div>
            `);
            
            // Settings Card
            cards.push(`
                <div class="feature-card">
                    <h3>Server Settings</h3>
                    <p>Configure execution modes, LLM providers, and feature toggles. View current configuration in a redacted format.</p>
                    <a href="/settings.html" class="cta">Open Settings →</a>
                </div>
            `);

            // Shell Card (basic, always shown for now; could condition on execution.shell)
            cards.push(`
                <div class="feature-card">
                    <h3>Shell / Sessions</h3>
                    <p>Start and manage interactive shell sessions over WebSocket.</p>
                    <a href="/shell.html" class="cta">Open Shell →</a>
                </div>
            `);
            
            return cards.join('');
        }
        
        // Load features on page load
        loadFeatures();
    </script>
</body>
</html>
