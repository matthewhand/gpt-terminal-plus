openapi: 3.0.3
info:
  title: gpt-terminal-plus API
  version: 0.1.0
  description: OpenAPI generated from JSDoc annotations.
servers:
  - url: http://localhost:3100
    description: Public base URL
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API_TOKEN
  schemas:
    ExecutionResult:
      type: object
      properties:
        stdout:
          type: string
        stderr:
          type: string
        exitCode:
          type: integer
        error:
          type: boolean
      required:
        - stdout
        - stderr
        - exitCode
        - error
paths:
  /server/list:
    get:
      operationId: serverList
      summary: List servers for this API token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  servers:
                    type: array
                    items:
                      type: object
                required:
                  - servers
  /command/execute:
    post:
      operationId: executeCommand
      summary: Execute using first available mode
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                command:
                  type: string
              required:
                - command
      responses:
        "200":
          description: Execution complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: "#/components/schemas/ExecutionResult"
                  aiAnalysis:
                    type: object
                required:
                  - result
  /command/execute-code:
    post:
      operationId: executeCode
      summary: Execute a code snippet
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                language:
                  type: string
                code:
                  type: string
                timeoutMs:
                  type: integer
              required:
                - language
                - code
      responses:
        "200":
          description: Execution complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: "#/components/schemas/ExecutionResult"
                  aiAnalysis:
                    type: object
                required:
                  - result
  /command/execute-file:
    post:
      operationId: executeFile
      summary: Execute a file present on the server/target (deprecated)
      deprecated: true
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filename:
                  type: string
                directory:
                  type: string
                timeoutMs:
                  type: integer
              required:
                - filename
      responses:
        "200":
          description: Execution complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: "#/components/schemas/ExecutionResult"
                  aiAnalysis:
                    type: object
                required:
                  - result
  /settings:
    get:
      operationId: getSettings
      summary: Get redacted configuration settings
      description: Returns grouped configuration values with secrets redacted. Values
        overridden by environment variables are marked as readOnly.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Redacted settings grouped by category
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  description: A settings group (e.g., server, security, llm, compat)
                  additionalProperties:
                    type: object
                    properties:
                      value:
                        oneOf:
                          - type: string
                          - type: number
                          - type: boolean
                          - type: object
                          - type: array
                          - type: "null"
                      readOnly:
                        type: boolean
                    required:
                      - value
                      - readOnly
                properties:
                  server:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        value:
                          oneOf:
                            - type: string
                            - type: number
                            - type: boolean
                            - type: object
                            - type: array
                            - type: "null"
                        readOnly:
                          type: boolean
                      required:
                        - value
                        - readOnly
                  security:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        value:
                          oneOf:
                            - type: string
                            - type: number
                            - type: boolean
                            - type: object
                            - type: array
                            - type: "null"
                        readOnly:
                          type: boolean
                      required:
                        - value
                        - readOnly
                  llm:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        value:
                          oneOf:
                            - type: string
                            - type: number
                            - type: boolean
                            - type: object
                            - type: array
                            - type: "null"
                        readOnly:
                          type: boolean
                      required:
                        - value
                        - readOnly
                  compat:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        value:
                          oneOf:
                            - type: string
                            - type: number
                            - type: boolean
                            - type: object
                            - type: array
                            - type: "null"
                        readOnly:
                          type: boolean
                      required:
                        - value
                        - readOnly
                required:
                  - server
                  - security
                  - llm
                  - compat
              examples:
                sample:
                  summary: Example response
                  value:
                    server:
                      port:
                        value: 5005
                        readOnly: false
                      httpsEnabled:
                        value: false
                        readOnly: false
                    security:
                      apiToken:
                        value: "*****"
                        readOnly: true
                    llm:
                      provider:
                        value: openai
                        readOnly: false
                      openai.baseUrl:
                        value: ""
                        readOnly: false
                      openai.apiKey:
                        value: "*****"
                        readOnly: true
                    compat:
                      llmProvider:
                        value: ""
                        readOnly: false
  /config/schema:
    get:
      operationId: getConfigSchema
      summary: Get configuration schema
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Configuration schema
  /config/override:
    get:
      operationId: getConfigOverride
      summary: Get current configuration
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current configuration
    post:
      operationId: setConfigOverride
      summary: Update configuration
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Arbitrary configuration overrides
              properties:
                API_TOKEN:
                  type: string
                  description: Override API token (will be redacted in responses)
              additionalProperties: true
      responses:
        "200":
          description: Configuration updated
        "400":
          description: Invalid configuration
  /config/settings:
    get:
      operationId: getConfigSettings
      summary: Get redacted configuration settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Redacted configuration settings
  /file/search:
    post:
      summary: Search for files using regex pattern
      description: Perform a regex search across files in a specified directory with
        pagination support
      tags:
        - File Operations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pattern
                - path
              properties:
                pattern:
                  type: string
                  description: Regex pattern to search for
                  example: function.*test
                path:
                  type: string
                  description: Directory path to search in
                  example: src
                caseSensitive:
                  type: boolean
                  description: Whether the search should be case sensitive
                  default: false
                  example: false
                page:
                  type: integer
                  description: Page number for pagination (1-based)
                  default: 1
                  minimum: 1
                  example: 1
                limit:
                  type: integer
                  description: Number of results per page
                  default: 100
                  minimum: 1
                  maximum: 1000
                  example: 50
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Search completed successfully
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            filePath:
                              type: string
                              description: Relative path to the file
                              example: src/utils/helper.ts
                            lineNumber:
                              type: integer
                              description: Line number where the match was found
                              example: 42
                            content:
                              type: string
                              description: The matched line content
                              example: export function testHelper() {
                      total:
                        type: integer
                        description: Total number of matches found
                        example: 150
                      limit:
                        type: integer
                        description: Number of results per page
                        example: 50
                      offset:
                        type: integer
                        description: Offset for pagination
                        example: 0
        "400":
          description: Bad request - invalid parameters or regex
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Invalid regex pattern
                  data:
                    type: null
        "403":
          description: Forbidden - file search is disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: File search is disabled
                  data:
                    type: null
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  message:
                    type: string
                    example: Internal server error
                  data:
                    type: null
  /files/op:
    post:
      operationId: fileOperation
      summary: Execute file operation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum:
                    - read
                    - write
                    - delete
                    - list
                    - mkdir
                path:
                  type: string
                content:
                  type: string
                recursive:
                  type: boolean
              required:
                - type
                - path
      responses:
        "200":
          description: Operation completed
        "400":
          description: Invalid operation
        "403":
          description: Path not allowed
  /llm/plan:
    post:
      operationId: llmPlan
      summary: Plan command using LLM
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  type: string
              required:
                - input
      responses:
        "200":
          description: Command planned
        "400":
          description: Input required
        "429":
          description: Budget exceeded
  /remote/ssh:
    post:
      operationId: createSSH
      summary: Create SSH session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                host:
                  type: string
                user:
                  type: string
              required:
                - host
      responses:
        "200":
          description: SSH session created
  /remote/ssm:
    post:
      operationId: createSSM
      summary: Create SSM session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                instanceId:
                  type: string
              required:
                - instanceId
      responses:
        "200":
          description: SSM session created
  /remote/list:
    get:
      operationId: listRemote
      summary: List remote sessions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Remote sessions
  /shell:
    get:
      operationId: shellRoot
      summary: Information about shell session endpoints
      description: Provides information about available shell session management endpoints
      responses:
        "200":
          description: Information about available endpoints
  /shell/llm/plan-exec:
    post:
      operationId: shellLlmPlanExec
      summary: Plan and optionally execute command via LLM
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  type: string
                autoExecute:
                  type: boolean
              required:
                - input
      responses:
        "200":
          description: Command planned/executed
        "400":
          description: Input required
        "429":
          description: Budget exceeded
  /shell/session/start:
    post:
      operationId: shellSessionStart
      summary: Start a new shell session
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                shell:
                  type: string
                  example: bash
      responses:
        "200":
          description: Session started
  /shell/session/list:
    get:
      operationId: shellSessionList
      summary: List active shell sessions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of sessions
  /shell/session/{id}/exec:
    post:
      operationId: shellSessionExec
      summary: Execute a command in a shell session
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                command:
                  type: string
              required:
                - command
      responses:
        "200":
          description: Command executed
  /shell/session/{id}/logs:
    get:
      operationId: shellSessionLogs
      summary: Get logs for a shell session
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session logs
  /shell/session/{id}/stop:
    post:
      operationId: shellSessionStop
      summary: Stop a shell session
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session stopped
tags: []
