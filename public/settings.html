<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings | GPT Terminal Plus</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background:#0f172a; color:#e2e8f0; padding:20px; max-width:800px; margin:0 auto; }
    h1,h2 { color:#60a5fa; }
    .section { background:#1e293b; padding:16px; margin:12px 0; border-radius:8px; }
    .field { margin:10px 0; }
    label { display:block; font-size:0.85em; color:#94a3b8; margin-bottom:4px; }
    input, select { width:100%; padding:8px; background:#0f172a; color:#e2e8f0; border:1px solid #475569; border-radius:4px; box-sizing:border-box; }
    input[type="checkbox"] { width:auto; }
    small { display:block; margin-top:4px; }
    button { background:#3b82f6; color:#fff; padding:10px 18px; border:none; border-radius:6px; cursor:pointer; margin-top:12px; }
    .nav a { color:#60a5fa; margin-right:12px; text-decoration:none; }
    #output { background:#111827; padding:10px; white-space:pre-wrap; font-family:monospace; font-size:0.8em; }
  </style>
    <link rel="stylesheet" href="/assets/base.css">
    <script src="/assets/nav.js" defer></script>
  </head>
<body>
  <h1>Settings</h1>

  <div class="section">
    <h2>Server</h2>
    <div class="field"><label for="port-field">Port</label><input id="port-field" type="number" min="1" max="65535" value="5005"></div>
    <div class="field">
      <label for="cors-field">CORS Origins</label>
      <input id="cors-field" value="http://localhost:*">
      <small style="color:#94a3b8;">Comma-separated list of allowed origins.</small>
    </div>
  </div>

  <div class="section">
    <h2>LLM</h2>
    <div class="field">
      <label for="llm-provider">Provider</label>
      <select id="llm-provider">
        <option value="none">none</option>
        <option value="openai">openai</option>
        <option value="ollama">ollama</option>
        <option value="lmstudio">lmstudio</option>
      </select>
    </div>
    <div class="field"><label for="llm-enabled">Enabled</label><input type="checkbox" id="llm-enabled"></div>
  </div>

  <button id="saveBtn">Save</button>
  <div id="output" role="status" aria-live="polite"></div>

  <script>
    async function loadSettings() {
      const token = localStorage.getItem('gpt-terminal-token') || '';
      try {
        const res = await fetch('/settings', { headers: { Authorization: `Bearer ${token}` } });
        if (!res.ok) throw new Error('load failed');
        const data = await res.json();
        const settings = data.settings || data;  // support wrapped or direct payload
        // Populate from redacted structure if present
        if (settings.server) {
          if (settings.server.port) document.getElementById('port-field').value = settings.server.port.value || 5005;
          if (settings.server.corsOrigin || settings.server['cors-origin']) {
            const v = (settings.server.corsOrigin || settings.server['cors-origin']).value;
            // Preserve ALL configured origins (previously only v[0] was shown,
            // so saving silently dropped the rest).
            document.getElementById('cors-field').value = Array.isArray(v) ? v.join(', ') : (v || 'http://localhost:*');
          }
        }
        if (settings.llm) {
          document.getElementById('llm-enabled').checked = !!settings.llm.enabled?.value;
          if (settings.llm.provider) document.getElementById('llm-provider').value = settings.llm.provider.value || 'none';
        }
      } catch (e) { e;
        // fallback demo values
        console.log('settings load fallback');
      }
    }
    async function save() {
      const token = localStorage.getItem('gpt-terminal-token') || '';
      // Split the comma-separated origins back into an array so multiple values
      // round-trip without loss; fall back to a single string if only one.
      const corsRaw = document.getElementById('cors-field').value;
      const corsList = corsRaw.split(',').map(s => s.trim()).filter(Boolean);
      const updates = {
        'server.port': parseInt(document.getElementById('port-field').value, 10) || 5005,
        'server.corsOrigin': corsList.length > 1 ? corsList : (corsList[0] || '')
      };
      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      // LLM uses special endpoint to update SettingsStore (affects dashboard/llm-console flags)
      const llmUpdates = {
        enabled: document.getElementById('llm-enabled').checked,
        provider: document.getElementById('llm-provider').value
      };
      let res = await fetch('/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(updates)
      });
      let llmRes = await fetch('/setup/llm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(llmUpdates)
      });
      const out = document.getElementById('output');
      out.textContent = (res.ok && llmRes.ok) ? 'Saved successfully' : 'Save had errors';
      saveBtn.disabled = false;
    }
    document.getElementById('saveBtn').onclick = save;
    loadSettings();
  </script>
</body>
</html>
