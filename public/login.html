<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login | GPT Terminal Plus</title>
    <style>
      body { font-family: var(--font); margin: 0; padding: 40px; background: var(--bg); color: var(--text); }
      main { max-width: 420px; margin: 0 auto; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; background: var(--surface); box-shadow: var(--shadow); }
      h1 { margin-top: 0; font-size: 1.7rem; }
      p { color: var(--text-muted); line-height: 1.5; }
      label { display: block; font-weight: 600; margin-bottom: 6px; }
      input[type="text"], input[type="password"] { width: 100%; padding: 12px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); color: inherit; }
      .token-row { position: relative; }
      .token-row input { padding-right: 64px; }
      .toggle-visibility { position: absolute; right: 6px; top: 6px; width: auto; margin: 0; padding: 6px 10px; font-size: 0.8rem; background: rgba(255,255,255,0.12); color: inherit; border-radius: 8px; font-weight: 600; }
      button { width: 100%; margin-top: 18px; padding: 12px 16px; border-radius: var(--radius); border: none; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: var(--accent-contrast); font-weight: 700; cursor: pointer; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .note { margin-top: 20px; font-size: 0.85rem; color: var(--text-dim); }
      .success { color: var(--success); }
      .error { color: var(--error); }
      .hidden { display: none; }
    </style>
      <link rel="stylesheet" href="/assets/base.css">
    <script src="/assets/nav.js" defer></script>
  </head>
  <body>
    <main>
      <h1>Login</h1>
      <p>Authenticate with a bearer token to access protected endpoints.</p>
      <form id="loginForm">
        <label for="token">API Token</label>
        <div class="token-row">
          <input id="token" name="token" type="password" placeholder="Paste your bearer token" autocomplete="off" required />
          <button type="button" id="toggleToken" class="toggle-visibility" aria-pressed="false" aria-label="Show token">Show</button>
        </div>
        <button type="submit">Submit</button>
      </form>
      <p id="message" class="hidden" role="status" aria-live="polite"></p>
      <p class="note">Enter your API token above. You can find it in your server logs or configuration.</p>
    </main>
    <script>
      // Show/hide the token so users can verify what they pasted.
      (function () {
        const input = document.getElementById('token');
        const toggle = document.getElementById('toggleToken');
        toggle.addEventListener('click', function () {
          const show = input.type === 'password';
          input.type = show ? 'text' : 'password';
          toggle.textContent = show ? 'Hide' : 'Show';
          toggle.setAttribute('aria-pressed', String(show));
          toggle.setAttribute('aria-label', show ? 'Hide token' : 'Show token');
          input.focus();
        });
      })();

      document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const token = document.getElementById('token').value;
        // Target the submit button specifically: the Show/Hide toggle is now the
        // first <button> in the DOM, so querySelector('button') would grab it.
        const button = document.querySelector('#loginForm button[type="submit"]');
        const message = document.getElementById('message');
        
        // Disable button and show loading
        button.disabled = true;
        button.textContent = 'Validating...';
        
        try {
          const response = await fetch('/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({ token })
          });
          
          if (response.ok) {
            message.className = 'success';
            message.textContent = 'Token validated successfully! You can now use protected endpoints.';
            message.classList.remove('hidden');
            // Store token in localStorage for convenience
            localStorage.setItem('gpt-terminal-token', token);
            // Redirect to home page after successful login
            setTimeout(() => {
              window.location.href = '/';
            }, 2000);
          } else {
            const data = await response.json();
            message.className = 'error';
            message.textContent = data.error || 'Invalid token';
            message.classList.remove('hidden');
          }
        } catch (error) {
          message.className = 'error';
          message.textContent = 'Error validating token: ' + error.message;
          message.classList.remove('hidden');
        } finally {
          button.disabled = false;
          button.textContent = 'Submit';
        }
      });
    </script>
  </body>
</html>
